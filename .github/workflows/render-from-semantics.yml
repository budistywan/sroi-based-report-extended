name: Render Laporan dari Enriched Semantics (Fase 2)

on:
  workflow_dispatch:
    inputs:
      program:
        description: 'Kode program (ESL / EHS / dll.)'
        required: true
        default: 'ESL'
        type: string
      semantics:
        description: 'Path file zip enriched semantics di repo'
        required: true
        default: 'data/enriched_semantics/exports.zip'
        type: string
      mode:
        description: 'Mode render'
        required: false
        default: 'render-only'
        type: choice
        options:
          - render-only

  push:
    paths:
      - 'data/enriched_semantics/**.zip'

jobs:
  render-from-semantics:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm install

      # ── Resolve inputs ────────────────────────────
      - name: Resolve program and zip path
        id: inputs
        run: |
          if [ -n "${{ github.event.inputs.program }}" ]; then
            PROGRAM="${{ github.event.inputs.program }}"
          else
            PROGRAM=$(git diff --name-only HEAD~1 HEAD \
              | grep 'data/enriched_semantics/' \
              | head -1 \
              | grep -oiE 'ESL|EHS|ESD|ESP|ESS|ETB|PSN' \
              | head -1 \
              | tr '[:lower:]' '[:upper:]')
            PROGRAM=${PROGRAM:-ESL}
          fi

          if [ -n "${{ github.event.inputs.semantics }}" ]; then
            ZIP_PATH="${{ github.event.inputs.semantics }}"
          else
            # Coba dari git diff dulu
            ZIP_PATH=$(git diff --name-only HEAD~1 HEAD \
              | grep 'data/enriched_semantics/.*\.zip' \
              | head -1)
            # Fallback: ambil file zip terbaru di folder
            if [ -z "${ZIP_PATH}" ]; then
              ZIP_PATH=$(find data/enriched_semantics -name "*.zip" \
                -newer data/enriched_semantics/.gitkeep 2>/dev/null \
                | sort -t_ -k1 | tail -1)
            fi
            # Fallback terakhir: zip apapun yang ada
            if [ -z "${ZIP_PATH}" ]; then
              ZIP_PATH=$(find data/enriched_semantics -name "*.zip" \
                | head -1)
            fi
          fi

          if [ -z "${ZIP_PATH}" ]; then
            echo "ERROR: Tidak ada file zip di data/enriched_semantics/"
            echo "Pastikan file zip sudah di-push ke repo"
            exit 1
          fi

          echo "program=${PROGRAM}" >> $GITHUB_OUTPUT
          echo "zip_path=${ZIP_PATH}" >> $GITHUB_OUTPUT
          echo "Program : ${PROGRAM}"
          echo "Zip path: ${ZIP_PATH}"

      # ── Extract + normalize semantic files ────────
      - name: Extract dan normalisasi enriched semantics
        run: |
          PROGRAM="${{ steps.inputs.outputs.program }}"
          ZIP_PATH="${{ steps.inputs.outputs.zip_path }}"

          if [ ! -f "${ZIP_PATH}" ]; then
            echo "ERROR: File zip tidak ditemukan: ${ZIP_PATH}"
            exit 1
          fi

          echo "Extracting: ${ZIP_PATH}"
          EXTRACT_DIR="semantic_editor/extracted_${PROGRAM}"
          mkdir -p "${EXTRACT_DIR}"
          unzip -o "${ZIP_PATH}" -d "${EXTRACT_DIR}"

          echo ""
          echo "=== Files in zip ==="
          find "${EXTRACT_DIR}" -type f | sort

          WORK_DIR="output/${PROGRAM,,}/work"
          mkdir -p "${WORK_DIR}"

          echo ""
          echo "=== Normalizing semantic files ==="

          python3 - << PYEOF
          import json, re, shutil
          from pathlib import Path

          extract_dir = Path("${EXTRACT_DIR}")
          work_dir    = Path("${WORK_DIR}")
          program     = "${PROGRAM}"

          def clean_chapter(chapter):
              """Strip annotation fields, set render_source."""
              chapter.pop("_export_metadata", None)
              cleaned = []
              for block in chapter.get("blocks", []):
                  cleaned.append({k: v for k, v in block.items()
                                   if not k.startswith("_")})
              chapter["blocks"] = cleaned
              chapter["render_source"] = "enriched_semantics_fase2"
              return chapter

          def write_chapter(chapter, work_dir):
              """Write chapter to correct filename for assembler."""
              chapter_id = chapter.get("chapter_id", "")
              m = re.search(r"\d+", chapter_id)
              if not m:
                  print(f"  SKIP: chapter_id tidak valid: '{chapter_id}'")
                  return None
              n = int(m.group())
              out_name = "chapter_semantic_bab7.json" if n == 7 \
                         else f"chapter_semantic_bab_{n}.json"
              out_path = work_dir / out_name
              json.dump([chapter], open(out_path, "w"),
                        indent=2, ensure_ascii=False)
              return n, out_name

          processed = []

          # ── FORMAT A: file tunggal berisi array semua bab ──────────
          # Nama file: enriched_EHS.json, bab_1-9_enriched.json, dsb.
          # Isi: [ {chapter_id: bab_1, ...}, {chapter_id: bab_2, ...}, ... ]
          single_files = [
              f for f in extract_dir.rglob("*.json")
              if not f.name.endswith("_editable.json")
              and not f.name.endswith("_original.json")
              and not f.name.endswith("_EDITING_GUIDE.md")
          ]

          for sf in single_files:
              try:
                  raw = json.load(open(sf, encoding="utf-8"))
              except Exception as e:
                  print(f"  SKIP {sf.name}: {e}")
                  continue

              # Deteksi: array of chapters (Format A)
              if isinstance(raw, list) and len(raw) > 0 \
                      and isinstance(raw[0], dict) \
                      and "chapter_id" in raw[0] \
                      and "blocks" in raw[0]:
                  print(f"  Format A (array tunggal): {sf.name} "
                        f"→ {len(raw)} bab")
                  for chapter in raw:
                      result = write_chapter(clean_chapter(chapter), work_dir)
                      if result:
                          n, out_name = result
                          processed.append(n)
                          print(f"    ✓ {chapter['chapter_id']} → {out_name} "
                                f"({len(chapter['blocks'])} blocks)")
                  continue

              # Deteksi: single chapter object (Format B tanpa _editable suffix)
              if isinstance(raw, dict) and "chapter_id" in raw and "blocks" in raw:
                  result = write_chapter(clean_chapter(raw), work_dir)
                  if result:
                      n, out_name = result
                      processed.append(n)
                      print(f"  Format B (single): {sf.name} → {out_name}")
                  continue

              # Deteksi: array wrapping single chapter
              if isinstance(raw, list) and len(raw) == 1 \
                      and "chapter_id" in raw[0]:
                  result = write_chapter(clean_chapter(raw[0]), work_dir)
                  if result:
                      n, out_name = result
                      processed.append(n)
                      print(f"  Format B (wrapped): {sf.name} → {out_name}")
                  continue

          # ── FORMAT B: file per bab dengan suffix _editable ────────
          editable_files = sorted(extract_dir.rglob("*_editable.json"))
          if editable_files:
              print(f"\n  Format B (_editable): {len(editable_files)} file")
          for f in editable_files:
              stem = f.stem.replace("_editable", "")
              try:
                  raw = json.load(open(f, encoding="utf-8"))
                  chapter = raw[0] if isinstance(raw, list) else raw
                  m = re.search(r"\d+", chapter.get("chapter_id", stem))
                  if not m:
                      continue
                  n = int(m.group())
                  if n in processed:
                      print(f"    SKIP {f.name}: bab_{n} sudah diproses")
                      continue
                  result = write_chapter(clean_chapter(chapter), work_dir)
                  if result:
                      n, out_name = result
                      processed.append(n)
                      print(f"    ✓ {f.name} → {out_name} "
                            f"({len(chapter['blocks'])} blocks)")
              except Exception as e:
                  print(f"    ✗ {f.name}: {e}")

          # ── FALLBACK: bab yang tidak ada → dari data/semantic/ ────
          all_babs  = set(range(1, 10))
          missing   = all_babs - set(processed)

          if missing:
              print(f"\n  Fallback untuk bab: {sorted(missing)}")
              semantic_fallback = Path("data/semantic")
              for n in sorted(missing):
                  candidates = [
                      semantic_fallback / f"chapter_semantic_bab{n}.json",
                      semantic_fallback / f"chapter_semantic_bab_{n}.json",
                  ]
                  for c in candidates:
                      if c.exists():
                          out_name = "chapter_semantic_bab7.json" if n == 7 \
                                     else f"chapter_semantic_bab_{n}.json"
                          shutil.copy2(c, work_dir / out_name)
                          print(f"    fallback: {c.name} → {out_name}")
                          break
                  else:
                      print(f"    WARN: bab_{n} tidak ditemukan di mana pun")

          print(f"\nTotal: {len(processed)} bab enriched, "
                f"{len(missing)} bab fallback")
          PYEOF

          echo ""
          echo "=== Work dir contents ==="
          ls -la "${WORK_DIR}/"

      # ── Resolve canonical ─────────────────────────
      - name: Resolve canonical file
        id: canonical
        run: |
          PROGRAM="${{ steps.inputs.outputs.program }}"
          PROG_LOWER=$(echo "${PROGRAM}" | tr '[:upper:]' '[:lower:]')
          CANONICAL_PATH="data/canonical/canonical_${PROG_LOWER}_v1.json"
          if [ ! -f "${CANONICAL_PATH}" ]; then
            CANONICAL_PATH="sprint0/canonical_${PROG_LOWER}_v1.json"
          fi
          if [ ! -f "${CANONICAL_PATH}" ]; then
            CANONICAL_PATH="data/canonical/canonical_esl_v1.json"
            echo "WARN: Canonical ${PROGRAM} tidak ditemukan, pakai ESL fallback"
          fi
          echo "canonical=${CANONICAL_PATH}" >> $GITHUB_OUTPUT
          echo "Canonical: ${CANONICAL_PATH}"

      # ── Render full report ────────────────────────
      - name: Render full report
        run: |
          PROGRAM="${{ steps.inputs.outputs.program }}"
          PROG_LOWER=$(echo "${PROGRAM}" | tr '[:upper:]' '[:lower:]')
          WORK_DIR="output/${PROG_LOWER}/work"
          CANONICAL="${{ steps.canonical.outputs.canonical }}"
          OUTPUT_DIR="output/${PROG_LOWER}"
          OUTPUT_FILE="${OUTPUT_DIR}/${PROGRAM}_SROI_Laporan_Fase2.docx"
          mkdir -p "${OUTPUT_DIR}"

          echo "Rendering..."
          echo "  Semantic dir : ${WORK_DIR}"
          echo "  Canonical    : ${CANONICAL}"
          echo "  Output       : ${OUTPUT_FILE}"

          node sprint8/full_assembler.js \
            --semantic-dir  "${WORK_DIR}" \
            --semantic-dir6 "${WORK_DIR}" \
            --canonical     "${CANONICAL}" \
            --output        "${OUTPUT_FILE}"

          if [ ! -f "${OUTPUT_FILE}" ]; then
            echo "ERROR: Output docx tidak dihasilkan"
            exit 1
          fi

          SIZE=$(du -h "${OUTPUT_FILE}" | cut -f1)
          echo "✓ Render selesai: ${OUTPUT_FILE} (${SIZE})"

      # ── Render report JSON ────────────────────────
      - name: Generate render report
        run: |
          PROGRAM="${{ steps.inputs.outputs.program }}"
          PROG_LOWER=$(echo "${PROGRAM}" | tr '[:upper:]' '[:lower:]')
          WORK_DIR="output/${PROG_LOWER}/work"
          ZIP_PATH="${{ steps.inputs.outputs.zip_path }}"

          python3 - << PYEOF
          import json
          from pathlib import Path
          from datetime import datetime

          work_dir = Path("${WORK_DIR}")
          program  = "${PROGRAM}"

          bab_files = sorted(work_dir.glob("chapter_semantic_bab*.json"))
          bab_info  = []
          for f in bab_files:
              try:
                  data   = json.load(open(f))
                  ch     = data[0] if isinstance(data, list) else data
                  source = ch.get("render_source", "original_pipeline")
                  bab_info.append({
                      "file":       f.name,
                      "chapter_id": ch.get("chapter_id", "?"),
                      "blocks":     len(ch.get("blocks", [])),
                      "source":     source,
                  })
              except:
                  pass

          report = {
              "run_type":       "fase2_render",
              "program":        program,
              "rendered_at":    datetime.now().isoformat(),
              "zip_source":     "${ZIP_PATH}",
              "babs_rendered":  len(bab_info),
              "chapters":       bab_info,
              "enriched_count": sum(1 for b in bab_info
                                    if b["source"] == "enriched_semantics_fase2"),
              "original_count": sum(1 for b in bab_info
                                    if b["source"] != "enriched_semantics_fase2"),
          }

          out = work_dir / "render_report_fase2.json"
          json.dump(report, open(out, "w"), indent=2, ensure_ascii=False)
          print(f"Render report: {out}")
          print(f"  Enriched : {report['enriched_count']} bab")
          print(f"  Original : {report['original_count']} bab")
          print(f"  Total    : {report['babs_rendered']} bab")
          PYEOF

      # ── Collect + upload artifacts ────────────────
      - name: Collect artifacts
        run: |
          PROGRAM="${{ steps.inputs.outputs.program }}"
          PROG_LOWER=$(echo "${PROGRAM}" | tr '[:upper:]' '[:lower:]')
          mkdir -p artifacts
          cp output/${PROG_LOWER}/${PROGRAM}_SROI_Laporan_Fase2.docx artifacts/ 2>/dev/null || true
          cp output/${PROG_LOWER}/work/render_report_fase2.json artifacts/ 2>/dev/null || true
          echo "=== Artifacts ==="
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sroi-laporan-fase2-${{ steps.inputs.outputs.program }}-${{ github.run_number }}
          path: artifacts/
          retention-days: 30
